apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  labels:
    app: nginx
    tier: frontend
    component: proxy
    lab: lab4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
        component: proxy
        lab: lab4
    spec:
      containers:
        - name: nginx
          # Локальный образ, собранный в Minikube
          image: custom-nginx:1.0
          imagePullPolicy: Never
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          # Readiness probe для проверки готовности nginx
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          
          # Liveness probe для проверки работоспособности
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          
          # Volume для логов nginx
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
      
      volumes:
        - name: nginx-logs
          emptyDir: {}

